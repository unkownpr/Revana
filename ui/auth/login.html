<div class="auth-container auth-single">
	<div class="auth-card">
		<div class="auth-card-header">
			<h2 class="auth-card-title">{{ @lang.userLogin ?: 'User Login' }}</h2>
			<p class="auth-card-sub">{{ @lang.login ?: 'Login' }}</p>
		</div>
		<div class="auth-card-body">
			<form action="/login" method="post" name="form">
				<input type="hidden" name="csrf_token" value="{{ @CSRF }}">
				<div class="form-stack">
					<div class="form-group">
						<label>{{ @lang.username ?: 'Username' }}</label>
						<input class="textbox" type="text" name="name" id="name">
					</div>
					<div class="form-group">
						<label>{{ @lang.password ?: 'Password' }}</label>
						<input class="textbox" type="password" name="pass">
					</div>
					<include href="shared/recaptcha-widget.html" />
					<div class="form-group auth-submit">
						<input class="button" type="submit" name="login" value="{{ @lang.login ?: 'Login' }}">
					</div>
					<div class="auth-links">
						<a class="q_link" href="/forgot">{{ @lang.emailPass ?: 'Forgot password?' }}</a>
						<span class="auth-note">{{ @lang.userLogin ?: 'User Login' }}</span>
					</div>
				</div>
			</form>
		</div>
	</div>
</div>
