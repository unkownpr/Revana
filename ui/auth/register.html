<div class="auth-container auth-single">
	<div class="auth-card">
		<div class="auth-card-header">
			<h2 class="auth-card-title">{{ @lang.register ?: 'Register' }}</h2>
			<p class="auth-card-sub">{{ @lang.welcome ?: 'Welcome' }}</p>
		</div>
		<div class="auth-card-body">
			<form name="form1" method="post" action="/register">
				<input type="hidden" name="csrf_token" value="{{ @CSRF }}">
				<div class="form-stack">
					<div class="form-group">
						<label>{{ @lang.username ?: 'Username' }}</label>
						<input class="textbox" type="text" name="name">
					</div>
					<div class="form-group">
						<label>{{ @lang.password ?: 'Password' }}</label>
						<input class="textbox" type="password" name="pass">
					</div>
					<div class="form-group">
						<label>{{ @lang.retypePass ?: 'Retype password' }}</label>
						<input class="textbox" type="password" name="pass_">
					</div>
					<div class="form-group">
						<label>{{ @lang.validEmail ?: 'Valid email address' }}</label>
						<input class="textbox" type="text" name="email">
					</div>
					<div class="form-group">
						<label>{{ @lang.faction ?: 'Faction' }}</label>
						<select class="dropdown" name="faction">
							<repeat group="{{ @factions }}" value="{{ @faction }}">
								<option value="{{ @faction.id - 1 }}">{{ @faction.display_name ?: @faction.name }}</option>
							</repeat>
						</select>
					</div>
					<include href="shared/recaptcha-widget.html" />
					<div class="form-group auth-submit">
						<input class="button" type="submit" name="reg" value="{{ @lang.submit ?: 'Submit' }}">
					</div>
					<div class="auth-links">
						<a class="q_link" href="/login">{{ @lang.login ?: 'Login' }}</a>
						<span class="auth-note">{{ @lang.validEmail ?: 'Valid email address' }}</span>
					</div>
				</div>
			</form>
		</div>
	</div>
</div>
