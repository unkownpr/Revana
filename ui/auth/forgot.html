<div class="auth-container">
	<div class="card">
		<div class="card-header">{{ @lang.forgotPassword ?: 'Forgot Password' }}</div>
		<div class="card-body">
			<form action="/forgot" method="post">
				<input type="hidden" name="csrf_token" value="{{ @CSRF }}">
				<div class="form-stack">
					<div class="form-group">
						<label>{{ @lang.username ?: 'Username' }}</label>
						<input class="textbox" type="text" name="name">
					</div>
					<div class="form-group">
						<input class="button" type="submit" value="{{ @lang.resetPassword ?: 'Reset Password' }}">
					</div>
					<p>{{ @lang.resetDesc ?: 'A new password will be sent to the email address associated with your account.' }}</p>
				</div>
			</form>
		</div>
	</div>
</div>
<a class="q_link" href="/login">{{ @lang.backToLogin ?: 'Back to Login' }}</a>
