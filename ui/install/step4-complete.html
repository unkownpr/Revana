<html>
<link rel="stylesheet" type="text/css" href="/default/1/default.css">
<head>
<title>Devana - Installation Complete</title>
</head>
<body class="q_body">
<div align="center">

<table class="q_table">
	<tr>
		<td class="td_logo"><img src="/default/1/logo.jpg"></td>
	</tr>
	<tr>
		<td class="td_top_menu">
			<font class="q_label">Installation Wizard - Complete!</font>
		</td>
	</tr>
	<tr>

			<table class="q_table" style="border-collapse: collapse" width="400" border="1">

						<br><br>

				</tr>
			</table>
			<br><br>
			<font class="q_text">
				<i>For security, the installer has been locked.<br>

		</td>
	</tr>
</table>

</div>
